<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 星汐の幻想监控空间 🐷</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ff85a2;
            --soft-blue: #a2d2ff;
            --glass-bg: rgba(255, 255, 255, 0.85);
        }
        body { 
            background: linear-gradient(135deg, #fce4ec 0%, #e1f5fe 100%);
            background-attachment: fixed;
            font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            color: #555;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            border: 2px solid white;
            box-shadow: 0 15px 35px rgba(255, 133, 162, 0.2);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        .login-title {
            color: var(--primary-pink);
            font-weight: bold;
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.5rem;
        }
        .form-control {
            border-radius: 12px;
            border: 2px solid #f0f0f0;
            padding: 12px 15px;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: var(--primary-pink);
            box-shadow: 0 0 0 0.2rem rgba(255, 133, 162, 0.25);
        }
        .btn-login {
            background: linear-gradient(135deg, var(--primary-pink) 0%, #ff6b9d 100%);
            border: none;
            border-radius: 12px;
            padding: 12px;
            color: white;
            font-weight: bold;
            width: 100%;
            transition: all 0.3s ease;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 133, 162, 0.4);
            color: white;
        }
        .alert {
            border-radius: 12px;
            border: none;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: var(--primary-pink);
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .back-link a:hover {
            color: #ff6b9d;
            text-decoration: underline;
        }
        .mascot {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="mascot">🐷</div>
        <h2 class="login-title">管理员登录</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-3">
                <label for="username" class="form-label">用户名</label>
                <input type="text" class="form-control" id="username" name="username" required placeholder="请输入用户名">
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">密码</label>
                <input type="password" class="form-control" id="password" name="password" required placeholder="请输入密码">
            </div>
            <button type="submit" class="btn btn-login">登录</button>
        </form>
        
        <div class="back-link">
            <a href="{{ url_for('index') }}">← 返回监控面板</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
